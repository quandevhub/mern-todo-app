services:
  mongodb:
    restart: always

  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/todo
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8000
      - GMAIL_USERNAME=${GMAIL_USERNAME:-}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD:-}
    depends_on:
      - mongodb
    networks:
      - app-network
    restart: always

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        - REACT_APP_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: always
